<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="JBridge animated visualizer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fbfd"/>
      <stop offset="100%" stop-color="#e9eef4"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#26d6a3" stop-opacity="0.10"/>
      <stop offset="55%"  stop-color="#00a86b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00a86b" stop-opacity="0.70"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#00d084" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00d084" stop-opacity="0"/>
    </radialGradient>
    <style>
      .bar {
        fill: url(#barGrad);
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation-name: pulse;
        animation-timing-function: cubic-bezier(.45,.05,.55,.95);
        animation-iteration-count: infinite;
        will-change: transform;
      }
      @keyframes pulse {
        0%, 100% { transform: scaleY(0.18); }
        50%      { transform: scaleY(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .bar { animation: none; transform: scaleY(0.5); }
      }
    </style>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
